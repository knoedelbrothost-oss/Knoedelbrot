<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Knödelbrot Verlag</title>
    <link rel="icon" href="Logo.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="Logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Pacifico&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: "DynaPuff", system-ui;
            font-optical-sizing: auto;
            font-size: 20px;
            font-style: normal;
            font-variation-settings:
                "wdth" 100;
        }

        .center {
            display: block;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        h1 {
            font-family: "Pacifico", cursive;
            font-style: normal;
            color: black;
            font-size: 46px;
            text-align: center;
        }

        h2 {
            font-family: "Pacifico"
        }

        button {
            color: white;
            background-color: black;
            font-family: "DynaPuff", system-ui;
            font-optical-sizing: auto;
            font-size: 20px;
            font-style: normal;
            font-variation-settings: inline-block;
            border: none;
            border-radius: 90px;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            transition-duration: 0.4s;
        }

        button:hover {
            background-color: rgb(125, 125, 125);
            color: black;

        }

        hr {
            border-color: none;
            border-radius: 0px;
            height: 3px;
            background-color: black;
        }

        .klein {
            display: none;
        }

        main {
            padding: 0px 20px;
            text-align: center;
        }

        .last-books {
            text-align: center;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .last-books ul {
            list-style-type: none;
            padding: 0;
        }

        .last-books li {
            margin-bottom: 20px;
            margin-left: auto;
            margin-right: auto;
            max-width: fit-content;
            max-height: fit-content;
            padding: 12px;
            border-radius: 12px;
        }

        .last-books .soon {
            opacity: 0.5;

        }

        .last-books .autor {
            font-size: 14px;
            padding: 0px;
            margin-top: 0px;
        }

        img {
            width: 100px;
            height: auto;
        }

        footer {
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 600px) {
            body {
                font-size: 10px;
            }

            h1 {
                font-size: 23px;
            }

            h2 {
                font-size: 15px;
            }

            button {
                font-size: 10px;
            }

            .groß {
                display: none;
            }

            .klein {
                display: initial;
            }
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <script src="/header.js"></script>
    <script>
        fetch("/header.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("header-placeholder").innerHTML = html;

                // Header initialisieren
                initHeader();

                // Bonus-Button prüfen
                bonusAvailable();
            });
    </script>

    <main>
        <h1>Herzlich willkommen beim Knödelbrot Verlag</h1>
        <h2>Hier findest du alle Bücher, die wir bisher veröffentlicht haben.</h2>
        <hr>
        <div class="last-books">
            <h2>Unsere letzten Veröffentlichungen:</h2>
            <ul>
                <li style="background-color: yellow;">
                    <a href="/verlag/lin-chen/index.html">
                        <!-- <img src="/verlag/lin-chen/cover.png" alt="cover"><br> -->
                        Lin Chen - Biografie
                        <p class="autor">Niklas Awecker</p>
                    </a>
                </li>
            </ul>
        </div>

    </main>
    <footer>
        <p>&copy; 2026 Knödelbrot Verlag. Alle Rechte vorbehalten.</p>

    </footer>

</body>

</html>
